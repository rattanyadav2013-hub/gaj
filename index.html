<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Website</title>
<style>
body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    margin: 0;
    padding: 0;
    background-color: #f8f9fa;
    color: #212529;
}
header {
    background: #212529;
    color: #ffffff;
    padding: 30px 0;
    text-align: center;
}
.container {
    width: 85%;
    max-width: 900px;
    margin: 30px auto;
    overflow: hidden;
    padding: 30px;
    background: #ffffff;
    border-radius: 8px;
    box-shadow: 0 4px 6px rgba(0,0,0,0.1);
}
h1 {
    margin: 0;
    font-size: 2.5rem;
}
h2 {
    color: #007bff;
}
p {
    line-height: 1.6;
}
</style>
</head>
<body>
<header>
<h1>Welcome to My Website</h1>
</header>
<div class="container">
<h2>Hello World</h2>
<p>This is a live static website deployed directly from a GitHub repository.</p>
</div>
</body>
</html>
